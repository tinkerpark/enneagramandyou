/* ─── TIEBREAKER SCENARIOS ───────────────────────────────────────────────── */

const TIEBREAKERS = {};
const TB_ORDER = {};

function addTB(a, b, scenarios) {
  const key = [a, b].sort((x, y) => x - y).join('-');
  TIEBREAKERS[key] = scenarios;
}

function getTBScenarios(key) {
  const scenarios = TIEBREAKERS[key];
  if (!scenarios) return [];
  if (!TB_ORDER[key]) {
    TB_ORDER[key] = scenarios.map(() => Math.random() < 0.5);
  }
  return scenarios.map((sc, i) => ({
    text: sc.text,
    opts: TB_ORDER[key][i] ? [sc.opts[1], sc.opts[0]] : [sc.opts[0], sc.opts[1]]
  }));
}

/* ─── STATE ─────────────────────────────────────────────────────────────── */

let selectedVariants = null;
let quizOrder = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initVariants() {
  quizOrder = shuffle(QUIZZES.map((_, i) => i));
  selectedVariants = quizOrder.map(qi => {
    const q = QUIZZES[qi];
    const vi = Math.floor(Math.random() * q.variants.length);
    return q.variants[vi];
  });
}

function orderedQuiz(i) { return QUIZZES[quizOrder[i]]; }

let state = {
  screen: 'intro',
  page: 0,
  answers: QUIZZES.map(q => new Array(10).fill(null)),
  tbPair: null,
  tbAnswers: [null, null, null],
  expandedType: null
};

const MAX_SCORE = 20;

function pct(score) { return Math.round((score / MAX_SCORE) * 100); }

function totalScore(qi) {
  return state.answers[qi].reduce((s, a) => s + (a !== null ? [2,1,0][a] : 0), 0);
}

function allAnswered(qi) { return state.answers[qi].every(a => a !== null); }

function computeScores() {
  return quizOrder.map((qi, i) => ({ type: QUIZZES[qi].type, score: totalScore(i) }))
    .sort((a, b) => b.score - a.score);
}

/* ─── TIEBREAKER LOGIC ───────────────────────────────────────────────────── */

function getTBKey(a, b) {
  return [a, b].sort((x, y) => x - y).join('-');
}

function needsTiebreaker(scores) {
  if (scores.length < 2) return null;
  const top = scores[0].score;
  const second = scores[1].score;
  if (top - second <= 2) {
    return { a: scores[0].type, b: scores[1].type };
  }
  return null;
}

function resolveWithWings(scores) {
  const top2 = scores.slice(0, 2).map(s => s.type);
  const topScores = {};
  scores.forEach(s => { topScores[s.type] = s.score; });

  let bestType = top2[0];
  let bestScore = -1;

  top2.forEach(t => {
    const wings = WINGS[t];
    const wingSupport = wings.reduce((sum, w) => sum + (topScores[w] || 0), 0);
    const triadSupport = TRIADS[triadOf(t)]
      .filter(x => x !== t)
      .reduce((sum, x) => sum + (topScores[x] || 0), 0);
    const total = (topScores[t] * 2) + wingSupport + (triadSupport * 0.5);
    if (total > bestScore) { bestScore = total; bestType = t; }
  });

  return bestType;
}

function tbScores() {
  const counts = {};
  state.tbAnswers.forEach(t => { if (t !== null) counts[t] = (counts[t] || 0) + 1; });
  return counts;
}

function tbWinner() {
  const counts = tbScores();
  const { a, b } = state.tbPair;
  const ca = counts[a] || 0;
  const cb = counts[b] || 0;
  if (ca > cb) return a;
  if (cb > ca) return b;
  return null;
}

/* ─── RENDER HELPERS ─────────────────────────────────────────────────────── */

function renderDots() {
  const el = document.getElementById('hdr-right');
  if (!el) return;
  if (state.screen !== 'quiz') { el.innerHTML = ''; return; }
  let html = '<div class="progress-dots">';
  QUIZZES.forEach((_, i) => {
    let cls = 'dot';
    if (i < state.page) cls += ' done';
    else if (i === state.page) cls += ' cur';
    html += `<div class="${cls}"></div>`;
  });
  html += `</div><span class="hdr-label">${state.page + 1} / ${QUIZZES.length}</span>`;
  el.innerHTML = html;
}

function renderIntro() {
  return `<div class="screen intro">
    <div class="eyebrow">Personality Assessment</div>
    <h1 class="intro-title">Find your<br><span>Enneagram type.</span></h1>
    <p class="intro-sub">Nine short quizzes, one for each type. Rate each statement honestly. When you're done, we'll show you exactly where you land — and help you narrow it down if the result is close.</p>
    <div class="intro-meta">
      <div class="meta-item"><div class="meta-val">90</div><div class="meta-lbl">Statements</div></div>
      <div class="meta-item"><div class="meta-val">9</div><div class="meta-lbl">Types</div></div>
      <div class="meta-item"><div class="meta-val">~5</div><div class="meta-lbl">Minutes</div></div>
    </div>
    <button class="btn primary" onclick="startQuiz()">Begin</button>
  </div>`;
}

function renderQuiz() {
  const q = orderedQuiz(state.page);
  const vars = selectedVariants[state.page];
  const pctFill = (state.page / QUIZZES.length) * 100;
  const complete = allAnswered(state.page);
  const isLast = state.page === QUIZZES.length - 1;

  const stmts = vars.map((s, si) => {
    const ans = state.answers[state.page][si];
    const answered = ans !== null ? ' answered' : '';
    return `<div class="statement${answered}" id="stmt-${si}">
      <div class="stmt-text">${s}</div>
      <div class="opts">
        <button class="opt agree${ans===0?' selected':''}" onclick="pick(${state.page},${si},0)">Agree</button>
        <button class="opt neutral${ans===1?' selected':''}" onclick="pick(${state.page},${si},1)">Neutral</button>
        <button class="opt disagree${ans===2?' selected':''}" onclick="pick(${state.page},${si},2)">Disagree</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen quiz">
    <div class="progress-bar"><div class="progress-fill" style="width:${pctFill}%"></div></div>
    <div class="quiz-header">
      <div class="quiz-badge">${state.page + 1}</div>
      <div class="quiz-title-block">
        <div class="quiz-sub">Quiz ${state.page+1} of ${QUIZZES.length}</div>
        <div class="quiz-heading">How much does each statement resonate?</div>
      </div>
    </div>
    <div class="statements">${stmts}</div>
    <div class="nav" id="quiz-nav">
      <button class="btn" onclick="goPage(-1)" ${state.page===0?'disabled':''}>Back</button>
      ${complete
        ? `<button class="btn primary" onclick="${isLast?'finishQuiz()':'goPage(1)'}">${isLast?'See results':'Next'}</button>`
        : `<span class="incomplete-hint">Answer all to continue</span>`}
    </div>
  </div>`;
}

function renderTiebreaker() {
  const { a, b } = state.tbPair;
  const ta = TYPES[a]; const tb = TYPES[b];
  const key = getTBKey(a, b);
  const scenarios = getTBScenarios(key);
  const allDone = state.tbAnswers.every(x => x !== null);

  let scenHtml = scenarios.map((sc, i) => {
    const chosen = state.tbAnswers[i];
    return `<div class="scenario">
      <div class="scenario-num">Scenario ${i+1} of ${scenarios.length}</div>
      <div class="scenario-text">${sc.text}</div>
      <div class="scenario-opts">
        ${sc.opts.map((o, oi) => `<button class="scen-opt${chosen===o.type?' selected':''}" onclick="pickTB(${i},${o.type})">${o.text}</button>`).join('')}
      </div>
    </div>`;
  }).join('');

  return `<div class="screen tiebreak">
    <div class="tiebreak-header">
      <div class="tiebreak-eyebrow">One more step</div>
      <h2 class="tiebreak-heading">Your results are close. One more step.</h2>
      <p class="tiebreak-sub">Read each scenario and choose the response that feels most like you — not the one you wish were true, but the one that actually is.</p>
    </div>
    ${scenHtml}
    <div class="nav">
      <span class="tb-progress">${state.tbAnswers.filter(x=>x!==null).length} of ${scenarios.length} answered</span>
      ${allDone ? `<button class="btn primary" onclick="finishTB()">See my type</button>` : `<span class="incomplete-hint">Choose all to continue</span>`}
    </div>
  </div>`;
}

function renderResult(topTypeOverride) {
  const scores = computeScores();
  const topType = topTypeOverride || scores[0].type;
  const topData = TYPES[topType];
  const topScore = scores.find(s => s.type === topType)?.score || 0;
  const topPct = pct(topScore);

  const expanded = state.expandedType ?? topType;

  const cards = scores.map((s, i) => {
    const t = TYPES[s.type];
    const p = pct(s.score);
    const isExp = s.type === expanded;
    return `<div class="type-card${isExp?' expanded':''}" id="tc-${s.type}" onclick="toggleType(${s.type})">
      <div class="type-card-header">
        <div class="tc-num">${s.type}</div>
        <div class="tc-info">
          <div class="tc-name">${t.name}</div>
        </div>
        <div class="tc-bar-wrap">
          <div class="tc-bar-track"><div class="tc-bar-fill" style="width:0%" data-w="${p}"></div></div>
          <div class="tc-pct">${p}%</div>
        </div>
      </div>
      <div class="type-card-body">
        <div class="type-card-desc">${t.desc}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen result">
    <div class="result-circle-wrap">
      <div class="result-circle">
        <div class="result-circle-num">${topType}</div>
        <div class="result-circle-lbl">Type</div>
      </div>
    </div>
    <div class="result-connector"></div>
    <h2 class="result-name">${topData.name}</h2>
    <div class="result-tagline">${topData.tagline}</div>
    <div class="result-pct">You scored <strong>${topPct}%</strong> on this type.</div>
    <div class="result-desc">${topData.desc}</div>
    <div class="breakdown-label">All types — tap to explore</div>
    <div class="type-cards">${cards}</div>
    <div class="result-footer">
      <button class="retake" onclick="retake()">Start over</button>
    </div>
  </div>`;
}

/* ─── RENDER ─────────────────────────────────────────────────────────────── */

function render(topTypeOverride) {
  const root = document.getElementById('root');
  renderDots();
  if (state.screen === 'intro') root.innerHTML = renderIntro();
  else if (state.screen === 'quiz') root.innerHTML = renderQuiz();
  else if (state.screen === 'tiebreak') root.innerHTML = renderTiebreaker();
  else { root.innerHTML = renderResult(topTypeOverride); animateBars(); }
}

function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.tc-bar-fill[data-w]').forEach(b => {
      b.style.width = b.dataset.w + '%';
    });
  });
}

/* ─── ACTIONS ────────────────────────────────────────────────────────────── */

function startQuiz() {
  initVariants();
  state.screen = 'quiz';
  state.page = 0;
  render();
  scroll(0, 0);
}

function pick(qi, si, oi) {
  state.answers[qi][si] = oi;
  const stmtEl = document.getElementById(`stmt-${si}`);
  if (stmtEl) {
    stmtEl.classList.toggle('answered', true);
    stmtEl.querySelectorAll('.opt').forEach((btn, idx) => {
      btn.classList.toggle('selected', idx === oi);
    });
  }
  const complete = allAnswered(qi);
  const isLast = state.page === QUIZZES.length - 1;
  const nav = document.getElementById('quiz-nav');
  if (nav && complete) {
    const hint = nav.querySelector('.incomplete-hint');
    if (hint) {
      const btn = document.createElement('button');
      btn.className = 'btn primary';
      btn.textContent = isLast ? 'See results' : 'Next';
      btn.setAttribute('onclick', isLast ? 'finishQuiz()' : 'goPage(1)');
      hint.replaceWith(btn);
    }
  }
}

function goPage(d) {
  state.page = Math.max(0, Math.min(QUIZZES.length - 1, state.page + d));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function finishQuiz() {
  const scores = computeScores();
  const tb = needsTiebreaker(scores);
  if (tb) {
    const key = getTBKey(tb.a, tb.b);
    if (getTBScenarios(key).length) {
      state.tbPair = tb;
      state.tbAnswers = [null, null, null];
      state.screen = 'tiebreak';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
  }
  state.screen = 'result';
  state.expandedType = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pickTB(i, type) {
  state.tbAnswers[i] = type;
  render();
}

function finishTB() {
  const winner = tbWinner();
  let topType;
  if (winner) {
    topType = winner;
  } else {
    topType = resolveWithWings(computeScores());
  }
  state.screen = 'result';
  state.expandedType = topType;
  render(topType);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleType(type) {
  state.expandedType = state.expandedType === type ? null : type;
  document.querySelectorAll('.type-card').forEach(card => {
    const t = parseInt(card.id.replace('tc-', ''));
    card.classList.toggle('expanded', t === state.expandedType);
  });
  animateBars();
}

function retake() {
  state = {
    screen: 'intro', page: 0,
    answers: QUIZZES.map(() => new Array(10).fill(null)),
    tbPair: null, tbAnswers: [null, null, null], expandedType: null
  };
  selectedVariants = null;
  quizOrder = null;
  render();
  scroll(0, 0);
}

render();
</script>
</body>
</html>
